name: Review

on:
  issue_comment:
    types: [created]

jobs:
  review:
    if: >-
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@robo-review')
    name: claude review
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          ref: ${{ github.event.issue.pull_request.head_ref || github.head_ref }}
          fetch-depth: 1

      - name: extract prompt
        id: prompt
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          extra=$(echo "$COMMENT_BODY" | sed 's/.*@robo-review//' | xargs)
          echo "extra=$extra" >> "$GITHUB_OUTPUT"

      - name: review
        uses: anthropics/claude-code-action@38ec876110f9fbf8b950c79f534430740c3ac009 #v1.0.101
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.issue.number }}

            Please review this pull request with a focus on:
            - Code quality and best practices
            - Potential bugs or issues
            - Security implications
            - Performance considerations

            ${{ steps.prompt.outputs.extra && format('Additional instructions from the reviewer: {0}', steps.prompt.outputs.extra) || '' }}

            Note: The PR branch is already checked out in the current working directory.

            This is a review-only task. Do NOT create commits, push code, or modify any files.
            Use `gh pr comment` for top-level feedback.
            Use `mcp__github_inline_comment__create_inline_comment` (with `confirmed: true`) to highlight specific code issues.
            Only post GitHub comments - don't submit review text as messages.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
