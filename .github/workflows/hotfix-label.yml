name: Hotfix Label

on:
  pull_request:
    types: [opened]
    branches: [main]

permissions:
  pull-requests: write
  issues: write

jobs:
  label:
    name: label hotfix pr
    if: startsWith(github.event.pull_request.head.ref, 'hotfix/')
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: ensure hotfix label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create hotfix --color D93F0B --description "Hotfix targeting main" \
            --repo "${{ github.repository }}" 2>/dev/null || true

      - name: add label and comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --add-label hotfix

          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body "This PR will be automatically backported to \`develop\` after merge."
