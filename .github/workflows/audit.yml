name: Audit

on:
  pull_request:
    branches: [main]
  schedule:
    # Runs every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions: {}

concurrency:
  group: audit-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  audit:
    name: dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false
      - name: setup bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 #v2.2.0
        with:
          bun-version-file: .bun-version
      - name: install dependencies
        run: |
          bun add -d @socketsecurity/bun-security-scanner
          echo -e '\n[install.security]\nscanner = "@socketsecurity/bun-security-scanner"' >> bunfig.toml
          bun install --frozen-lockfile
      - name: audit
        run: bun audit --audit-level=moderate

  bearer:
    name: bearer sast
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write # reviewdog posts inline PR review comments
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false
      - name: setup reviewdog
        uses: reviewdog/action-setup@d8a7baabd7f3e8544ee4dbde3ee41d0011c3a93f #v1.5.0
      - name: bearer
        id: bearer
        uses: bearer/bearer-action@828eeb928ce2f4a7ca5ed57fb8b59508cb8c79bc #v2
        with:
          diff: ${{ github.event_name == 'pull_request' }}
          format: sarif
          output: bearer.sarif
        continue-on-error: true
      - name: reviewdog
        if: github.event_name == 'pull_request' && steps.bearer.outcome == 'failure'
        run: reviewdog -f=sarif -reporter=github-pr-review < bearer.sarif
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
      - name: summary
        if: steps.bearer.outcome == 'failure'
        run: |
          {
            echo "## Bearer SAST Findings"
            echo ""
            echo "| Severity | File | Line | Description |"
            echo "|----------|------|------|-------------|"
            jq -r '.runs[].results[] | "| \(.level) | `\(.locations[0].physicalLocation.artifactLocation.uri)` | \(.locations[0].physicalLocation.region.startLine) | \(.message.text) |"' bearer.sarif
          } >> "$GITHUB_STEP_SUMMARY"
          exit 1

  gitleaks:
    name: gitleaks secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: compute fetch depth
        id: depth
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "value=$(( ${{ github.event.pull_request.commits }} + 1 ))" >> "$GITHUB_OUTPUT"
          else
            echo "value=0" >> "$GITHUB_OUTPUT"
          fi
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: ${{ steps.depth.outputs.value }}
          persist-credentials: false
      - name: find secrets
        run: |
          docker run --rm -v "$(pwd)":/repository \
            ghcr.io/gitleaks/gitleaks:latest \
            detect -v -s=/repository

  zizmor:
    name: zizmor workflow audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false
      - name: setup uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          cache-dependency-glob: |
            package.json
      - name: zizmor
        run: uvx zizmor --format=github -c .zizmor.yml .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  semgrep:
    name: semgrep sast
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write # reviewdog posts inline PR review comments
    if: (github.actor != 'dependabot[bot]')
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false
      - name: setup reviewdog
        uses: reviewdog/action-setup@d8a7baabd7f3e8544ee4dbde3ee41d0011c3a93f #v1.5.0
      - name: setup uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          cache-dependency-glob: |
            package.json
      - name: scan
        id: scan
        run: uvx semgrep scan --config auto --sarif -o semgrep.sarif
        continue-on-error: true
      - name: reviewdog
        if: github.event_name == 'pull_request' && steps.scan.outcome == 'failure'
        run: reviewdog -f=sarif -reporter=github-pr-review < semgrep.sarif
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
      - name: summary
        if: steps.scan.outcome == 'failure'
        run: |
          {
            echo "## Semgrep SAST Findings"
            echo ""
            echo "| Severity | File | Line | Description |"
            echo "|----------|------|------|-------------|"
            jq -r '.runs[].results[] | "| \(.level) | `\(.locations[0].physicalLocation.artifactLocation.uri)` | \(.locations[0].physicalLocation.region.startLine) | \(.message.text) |"' semgrep.sarif
          } >> "$GITHUB_STEP_SUMMARY"
          exit 1
