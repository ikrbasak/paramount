name: Audit

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: audit-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  audit:
    name: security and code health
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read # required by bearer
    steps:
      - name: checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: true
      - name: setup bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 #v2.2.0
        with:
          bun-version-file: .bun-version
      - name: install dependencies
        run: bun install --frozen-lockfile
      - name: audit dependencies
        run: bun audit --audit-level=moderate
      - name: scan code health with fallow
        run: bunx fallow -f markdown --quiet >> $GITHUB_STEP_SUMMARY
      - name: scan code with bearer sast
        uses: bearer/bearer-action@828eeb928ce2f4a7ca5ed57fb8b59508cb8c79bc #v2
        with:
          diff: ${{ github.event_name == 'pull_request' }}
      - name: scan secrets with gitleaks
        run: |
          docker run --rm -v "$(pwd)":/repository \
            ghcr.io/gitleaks/gitleaks:latest \
            detect -v -s=/repository
      - name: audit workflows with zizmor
        run: |
          docker run --rm -v "$(pwd)":/repository \
            ghcr.io/zizmorcore/zizmor:latest \
            --format=$FORMAT -p -c /repository/.zizmor.yml /repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORMAT: ${{ github.event_name == 'pull_request' && 'github' || 'plain' }}
      - name: scan code with semgrep sast
        run: docker run --rm -v "$(pwd)":/src semgrep/semgrep semgrep ci --config auto
