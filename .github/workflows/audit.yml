name: Audit

on:
  pull_request:
    branches: [main]
  schedule:
    # Runs every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions: {}

jobs:
  audit:
    name: dependency audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false
      - name: setup bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 #v2.2.0
        with:
          bun-version-file: .bun-version
      - name: install dependencies
        run: |
          bun add -d @socketsecurity/bun-security-scanner
          echo -e '\n[install.security]\nscanner = "@socketsecurity/bun-security-scanner"' >> bunfig.toml
          bun install --frozen-lockfile
      - name: audit
        run: bun audit --audit-level=moderate

  bearer:
    name: bearer sast
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false
      - name: setup reviewdog
        uses: reviewdog/action-setup@d8a7baabd7f3e8544ee4dbde3ee41d0011c3a93f #v1.5.0
      - name: bearer
        id: bearer
        uses: bearer/bearer-action@828eeb928ce2f4a7ca5ed57fb8b59508cb8c79bc #v2
        with:
          diff: ${{ github.event_name == 'pull_request' }}
          format: sarif
          output: bearer.sarif
        continue-on-error: true
      - name: reviewdog
        if: github.event_name == 'pull_request'
        run: reviewdog -f=sarif -reporter=github-pr-review -fail-level=any < bearer.sarif
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: fail on findings
        if: steps.bearer.outcome == 'failure'
        run: exit 1

  gitleaks:
    name: gitleaks secret scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 #v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  zizmor:
    name: zizmor workflow audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false
      - name: setup uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 #v8.0.0
      - name: zizmor
        run: uvx zizmor --format=github .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  semgrep:
    name: semgrep sast
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    if: (github.actor != 'dependabot[bot]')
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false
      - name: setup reviewdog
        uses: reviewdog/action-setup@d8a7baabd7f3e8544ee4dbde3ee41d0011c3a93f #v1.5.0
      - name: setup uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 #v8.0.0
      - name: scan
        id: scan
        run: uvx semgrep scan --config auto --sarif -o semgrep.sarif
        continue-on-error: true
      - name: reviewdog
        if: github.event_name == 'pull_request'
        run: reviewdog -f=sarif -reporter=github-pr-review -fail-level=any < semgrep.sarif
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: fail on findings
        if: steps.scan.outcome == 'failure'
        run: exit 1
