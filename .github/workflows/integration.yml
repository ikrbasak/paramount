name: Integration

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: integration-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  TZ: UTC
  CI: true
  NODE_ENV: production

  # Postgres
  DATABASE_URL: postgresql://postgres:PasswordSAMPLE123@localhost:5444/integration

  # Redis
  REDIS_URL: redis://localhost:6380/0

  # Docker
  TAG: paramount

jobs:
  validation:
    name: validate
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          fetch-depth: 0
      - name: setup bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 #v2.2.0
        with:
          bun-version-file: .bun-version
      - name: branch name
        if: github.event_name == 'pull_request'
        env:
          HEAD_REF: ${{ github.head_ref }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          echo "The pull request proposes to merge $HEAD_REF to $BASE_REF"

          bun -e "
          const base = process.env.BASE_REF;
          const head = process.env.HEAD_REF;
          if (!base || !head) { console.error('BASE_REF and HEAD_REF are required'); process.exit(1); }

          const ticket = /^[0-9]+(?:-[a-z0-9]+)+$/;
          const [type, slug] = head.split('/', 2);

          const rules = {
            main: () => head === 'develop' || (type === 'hotfix' && ticket.test(slug)),
            develop: () => head === 'main' || (['feat','bug','bugfix','chore'].includes(type) && ticket.test(slug)),
          };

          if (!rules[base]) { console.error('invalid base branch: ' + base); process.exit(1); }
          if (!rules[base]()) { console.error('invalid: ' + head + ' -> ' + base); process.exit(1); }
          console.log('valid: ' + head + ' -> ' + base);
          "
      - name: install
        run: bun install
      - name: commitlint
        run: |
          bunx commitlint \
            --from ${{ github.event.pull_request.base.sha }} \
            --to ${{ github.event.pull_request.head.sha }} --verbose
        if: github.event_name == 'pull_request'
      - name: format
        run: bun run fmt:c
      - name: lint
        run: bun run lint:c
      - name: typecheck and build
        run: |
          bunx tsc
          bunx tsc -p tsconfig.build.json
          bun run build
      - name: unused exports
        run: |
          bun run knip
          bun run knip:p

  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      LOG_LEVEL: silent

    services:
      postgres:
        image: postgres:18-alpine
        ports: [5444:5432]
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: PasswordSAMPLE123
          POSTGRES_DB: integration
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 5
      redis:
        image: redis:8-alpine
        ports: [6380:6379]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 5

    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      - name: setup bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 #v2.2.0
        with:
          bun-version-file: .bun-version
      - name: install
        run: bun install
      - name: migrate
        run: make migration:run
      - name: seed
        run: make seeder:run
      - name: check migrations
        run: make migration:check
      - name: test with coverage
        run: bun run test:cov
        env:
          NODE_ENV: test
      - name: collect reports
        run: mkdir -p coverage && mv junit* coverage
        if: always()
      - name: upload coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        if: always()
        with:
          name: coverage
          path: coverage/

  health:
    name: health check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    services:
      postgres:
        image: postgres:18-alpine
        ports: [5444:5432]
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: PasswordSAMPLE123
          POSTGRES_DB: integration
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 5
      redis:
        image: redis:8-alpine
        ports: [6380:6379]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 5

    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      - name: setup bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 #v2.2.0
        with:
          bun-version-file: .bun-version
      - name: install
        run: bun install
      - name: build
        run: bun run build
      - name: migrate
        run: make migration:run
      - name: seed
        run: make seeder:run
      - name: start server
        run: |
          cd build
          nohup bun index.js > bun.log 2>&1 &
      - name: verify native health
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 #v4.0.0
        with:
          timeout_seconds: 2
          max_attempts: 5
          retry_wait_seconds: 2
          warning_on_retry: false
          command: curl -sf http://localhost:8080/api/v1/health | jq -r '.success' | grep -q true
      - name: stop server
        run: kill $(lsof -ti:8080) || true
      - name: build and run docker
        run: |
          docker buildx build -t $TAG -f Dockerfile .
          docker image inspect $TAG
          docker run -d \
            --add-host=host.docker.internal:host-gateway \
            -e DATABASE_URL=postgresql://postgres:PasswordSAMPLE123@host.docker.internal:5444/integration \
            -e REDIS_URL=redis://host.docker.internal:6380/1 \
            -p 8080:8080 \
            --name app-$TAG $TAG
      - name: verify docker health
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 #v4.0.0
        with:
          timeout_seconds: 2
          max_attempts: 5
          retry_wait_seconds: 2
          warning_on_retry: false
          command: curl -sf http://localhost:8080/api/v1/health | jq -r '.success' | grep -q true
