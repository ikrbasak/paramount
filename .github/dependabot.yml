version: 2

updates:
  - package-ecosystem: bun
    directory: /
    cooldown:
      default-days: 3
      exclude:
        - 'typescript'
    schedule:
      interval: weekly
      day: monday
      timezone: UTC
    open-pull-requests-limit: 10
    commit-message:
      prefix: 'chore(deps)'
      prefix-development: 'chore(dev-deps)'
    groups:
      production:
        dependency-type: production
        update-types: [minor, patch]
      development:
        dependency-type: development
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    cooldown:
      default-days: 3
    schedule:
      interval: weekly
      day: monday
      timezone: UTC
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'ci(deps)'
    groups:
      actions:
        update-types: [minor, patch]
